<h2 mat-dialog-title>{{ isEdit ? 'Edit user' : 'Create user' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ isEdit ? 'New password (optional)' : 'Password' }}</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="new-password" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm password</mat-label>
      <input matInput type="password" formControlName="confirm_password" autocomplete="new-password" />
    </mat-form-field>

    @if (canEditSuperuser) {
      <mat-checkbox formControlName="is_superuser">Superuser</mat-checkbox>
    }

    @if (error()) {
      <p style="color: var(--mat-sys-error); margin: 8px 0 0;">{{ error() }}</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="saving() || form.invalid">
    {{ isEdit ? 'Save' : 'Create' }}
  </button>
</mat-dialog-actions>
