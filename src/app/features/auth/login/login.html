<div class="login-wrap">
  <mat-card class="login-card">
    @if (loading() || passkeysLoading()) {
      <mat-progress-bar mode="indeterminate" />
    }
    <mat-card-header>
      <mat-card-title>
        <mat-icon class="brand-icon">link</mat-icon>
        {{ 'AUTH.TITLE' | translate }}
      </mat-card-title>
      <mat-card-subtitle>{{ 'AUTH.SUBTITLE' | translate }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'AUTH.USERNAME' | translate }}</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'AUTH.PASSWORD' | translate }}</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width" type="submit"
                [disabled]="loading() || passkeysLoading() || form.invalid">
          {{ 'AUTH.SIGN_IN' | translate }}
        </button>
      </form>

      @if (passkeysSupported) {
        <div class="divider">
          <span>{{ 'AUTH.OR' | translate }}</span>
        </div>

        <button mat-stroked-button class="full-width" type="button"
                [disabled]="loading() || passkeysLoading()" (click)="signInWithPasskey()">
          <mat-icon>fingerprint</mat-icon>
          {{ 'AUTH.SIGN_IN_PASSKEY' | translate }}
        </button>
      }
    </mat-card-content>
  </mat-card>
</div>
