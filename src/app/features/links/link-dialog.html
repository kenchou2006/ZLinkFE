<h2 mat-dialog-title>{{ isEdit ? 'Edit link' : 'Create link' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Destination URL</mat-label>
      <input matInput formControlName="original_url" placeholder="https://example.com" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Custom alias (optional)</mat-label>
      <input matInput formControlName="short_code" placeholder="leave blank to auto-generate" />
      <mat-hint>Used as the short code. Reserved words are rejected.</mat-hint>
    </mat-form-field>

    <mat-checkbox formControlName="neverExpires">Never expires</mat-checkbox>

    @if (!form.controls.neverExpires.value) {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Expires at</mat-label>
        <input matInput type="datetime-local" formControlName="expiresAt" />
      </mat-form-field>
    }

    @if (error()) {
      <p style="color: var(--mat-sys-error); margin: 0;">{{ error() }}</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="saving() || form.invalid">
    {{ isEdit ? 'Save' : 'Create' }}
  </button>
</mat-dialog-actions>
