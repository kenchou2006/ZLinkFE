<div class="page">
  <div class="header">
    <h1>Cache</h1>
    <div>
      <button mat-stroked-button (click)="load()">
        <mat-icon>refresh</mat-icon>
        Refresh
      </button>
      <button mat-flat-button color="warn" (click)="clearAll()" [disabled]="data().length === 0">
        <mat-icon>delete_sweep</mat-icon>
        Clear all
      </button>
    </div>
  </div>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <table mat-table [dataSource]="data()" class="full-width">
    <ng-container matColumnDef="display_key">
      <th mat-header-cell *matHeaderCellDef>Short code</th>
      <td mat-cell *matCellDef="let k">{{ k.display_key }}</td>
    </ng-container>

    <ng-container matColumnDef="ttl">
      <th mat-header-cell *matHeaderCellDef>TTL</th>
      <td mat-cell *matCellDef="let k">{{ ttlLabel(k.ttl) }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let k">{{ k.type }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
      <td mat-cell *matCellDef="let k" class="actions-col">
        <button mat-icon-button color="warn" matTooltip="Delete key" (click)="deleteKey(k)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (!loading() && !error() && data().length === 0) {
    <p class="empty">No cached keys.</p>
  }
</div>
