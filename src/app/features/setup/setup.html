<div class="setup-wrap">
  <mat-card class="setup-card">
    @if (testing()) {
      <mat-progress-bar mode="indeterminate" />
    }
    <mat-card-header>
      <mat-card-title>
        <mat-icon class="brand-icon">settings_ethernet</mat-icon>
        Connect to API
      </mat-card-title>
      <mat-card-subtitle>Enter the ZLink API endpoint to get started</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>API base URL</mat-label>
          <input matInput formControlName="apiBase" placeholder="https://api.example.com/api" />
          <mat-hint>Include the /api path. No trailing slash needed.</mat-hint>
        </mat-form-field>

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button mat-flat-button color="primary" class="full-width" type="submit"
                [disabled]="testing() || form.invalid">
          Test & save
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
