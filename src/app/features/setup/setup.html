<div class="setup-wrap">
  <mat-card class="setup-card">
    @if (testing()) {
      <mat-progress-bar mode="indeterminate" />
    }
    <mat-card-header>
      <mat-card-title>
        <mat-icon class="brand-icon">settings_ethernet</mat-icon>
        {{ 'SETUP.TITLE' | translate }}
      </mat-card-title>
      <mat-card-subtitle>{{ 'SETUP.SUBTITLE' | translate }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'SETUP.API_BASE' | translate }}</mat-label>
          <input matInput formControlName="apiBase" placeholder="https://api.example.com/api" />
          <mat-hint>{{ 'SETUP.API_HINT' | translate }}</mat-hint>
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width" type="submit"
                [disabled]="testing() || form.invalid">
          {{ 'SETUP.TEST_SAVE' | translate }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
